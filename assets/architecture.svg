<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <defs>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
  </defs>

  <rect width="800" height="340" fill="#080B11" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle" letter-spacing="3">ARCHITECTURE</text>

  <!-- Column headers -->
  <text x="130" y="70" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F8FAFC" text-anchor="middle">User</text>
  <text x="400" y="70" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F8FAFC" text-anchor="middle">Keeper (AI)</text>
  <text x="670" y="70" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F8FAFC" text-anchor="middle">On-Chain Program</text>

  <!-- Vertical lines -->
  <line x1="130" y1="85" x2="130" y2="310" stroke="#1E293B" stroke-width="2"/>
  <line x1="400" y1="85" x2="400" y2="310" stroke="#1E293B" stroke-width="2"/>
  <line x1="670" y1="85" x2="670" y2="310" stroke="#1E293B" stroke-width="2"/>

  <!-- Deposit USDC -->
  <line x1="135" y1="105" x2="395" y2="105" stroke="url(#cyan)" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="265" y="100" font-family="ui-monospace, monospace" font-size="11" fill="#0EA5E9" text-anchor="middle">deposit USDC</text>

  <!-- Score protocols -->
  <line x1="405" y1="140" x2="665" y2="140" stroke="url(#emerald)" stroke-width="2"/>
  <text x="535" y="135" font-family="ui-monospace, monospace" font-size="11" fill="#10B981" text-anchor="middle">score protocols</text>

  <!-- Propose rebalance -->
  <line x1="405" y1="170" x2="665" y2="170" stroke="url(#emerald)" stroke-width="2"/>
  <text x="535" y="165" font-family="ui-monospace, monospace" font-size="11" fill="#10B981" text-anchor="middle">propose rebalance</text>
  <text x="535" y="183" font-family="ui-monospace, monospace" font-size="9" fill="#475569" text-anchor="middle">(weights + reasoning)</text>

  <!-- Validate + enforce -->
  <text x="670" y="210" font-family="ui-monospace, monospace" font-size="10" fill="#F59E0B" text-anchor="middle">validate guardrails</text>
  <text x="670" y="225" font-family="ui-monospace, monospace" font-size="10" fill="#F59E0B" text-anchor="middle">enforce limits</text>
  <text x="670" y="240" font-family="ui-monospace, monospace" font-size="10" fill="#F59E0B" text-anchor="middle">emit events</text>

  <!-- Shares minted -->
  <line x1="395" y1="265" x2="135" y2="265" stroke="url(#cyan)" stroke-width="2"/>
  <text x="265" y="260" font-family="ui-monospace, monospace" font-size="11" fill="#0EA5E9" text-anchor="middle">shares minted</text>

  <!-- Withdraw -->
  <line x1="135" y1="295" x2="395" y2="295" stroke="url(#amber)" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="265" y="290" font-family="ui-monospace, monospace" font-size="11" fill="#F59E0B" text-anchor="middle">request withdraw</text>
  <text x="265" y="308" font-family="ui-monospace, monospace" font-size="9" fill="#475569" text-anchor="middle">(time-locked)</text>

  <!-- Trust model -->
  <text x="400" y="335" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Keeper proposes. Algorithm validates. Program enforces.</text>
</svg>
